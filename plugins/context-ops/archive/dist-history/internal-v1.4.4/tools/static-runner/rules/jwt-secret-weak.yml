rules:
  - id: internal.be.security.jwt-secret-weak
    message: |
      JWT secret 이 짧음 (length < 32 chars) 또는 hardcode.
      AP-SECURITY-001 BE / PoC #01 F-AP-SECURITY-001 (21byte critical) 학습.
      HMAC-SHA256 권고: 256 bit ≥ 32 bytes (ASCII 32 chars).
      OWASP A02:2021 / CWE-326 (Inadequate Encryption Strength).
      권고: 32+ random byte secret + env var 분리 + secret manager.
    severity: ERROR
    languages: [generic]
    pattern-either:
      # (1) yaml/properties: jwt.secret: "short" or jwt.secret = short
      - pattern-regex: '(?im)^\s*(jwt[._\-]?(secret|key)|JWT_SECRET|JWT_KEY|jwtSecret)\s*[:=]\s*["'']?[\w./+=\-]{1,31}["'']?\s*$'
      # (2) Java/JS/TS hardcode: String JWT_SECRET = "shortvalue"
      - pattern-regex: '(?i)\b(jwt[._\-]?(secret|key)|JWT_SECRET|JWT_KEY|jwtSecret|secretKey)\b\s*=\s*["''][\w./+=\-]{1,31}["'']'
    paths:
      exclude:
        - '*.test.*'
        - '*test/*'
        - '*tests/*'
        - '*__tests__/*'
        - '*spec/*'
        - '*.example'
        - '*.sample'
        - 'tools/static-runner/rules/*' # 본 rule 의 fixture 자기 매칭 exclude
    metadata:
      cwe: 'CWE-326'
      owasp: ['A02:2021']
      references:
        - https://datatracker.ietf.org/doc/html/rfc7518#section-3.2
        - https://cheatsheetseries.owasp.org/cheatsheets/JSON_Web_Token_for_Java_Cheat_Sheet.html
      category: security
      technology:
        [java, spring, node, nestjs, javascript, typescript, yaml, properties]
      license: Internal-Proprietary
      ai_native_methodology:
        antipattern: AP-SECURITY-001
        applies_to: BE
        cross_poc_evidence:
          - 'PoC #01 (Spring Boot 2.5) — JWT secret 21 byte critical'
          - 'PoC #02 (Spring Boot 3.3 Hexagonal) — RSA private key git commit critical ( 별 rule rsa-private-key-commit)'
          - 'PoC #03 (NestJS) — Bearer 표준 ✅ positive (학습 효과 / 비재현)'
        cross_poc_isomorphic_count: 2
        introduced_in: v1.4.4-pre
