rules:
  - id: internal.be.security.rsa-private-key-commit
    message: |
      PEM 형식 private key 가 source / config / resource 파일에 commit 됨.
      AP-SECURITY-001 BE / PoC #02 F-068 (RSA private key git commit critical) 학습.
      RSA / EC / DSA / OPENSSH / PKCS#1 / PKCS#8 / encrypted PKCS#8 모두 포함.
      OWASP A02:2021 / CWE-321 (Use of Hard-coded Cryptographic Key) + CWE-798 (Hard-coded Credentials).
      권고: secret manager (Vault / AWS Secrets Manager / ${CLAUDE_PLUGIN_DATA} 등) + .gitignore 에 *.key / *.pem 추가.
    severity: ERROR
    languages: [generic]
    pattern-either:
      - pattern-regex: '-----BEGIN RSA PRIVATE KEY-----'
      - pattern-regex: '-----BEGIN PRIVATE KEY-----'
      - pattern-regex: '-----BEGIN ENCRYPTED PRIVATE KEY-----'
      - pattern-regex: '-----BEGIN OPENSSH PRIVATE KEY-----'
      - pattern-regex: '-----BEGIN EC PRIVATE KEY-----'
      - pattern-regex: '-----BEGIN DSA PRIVATE KEY-----'
    paths:
      exclude:
        - '*.test.*'
        - '*test/*'
        - '*tests/*'
        - '*__tests__/*'
        - '*spec/*'
        - '*.example'
        - '*.sample'
        - '*node_modules/*'
        - '*vendor/*'
        - 'tools/static-runner/rules/*' # 본 rule 의 fixture 자기 매칭 exclude
    metadata:
      cwe: ['CWE-321', 'CWE-798']
      owasp: ['A02:2021', 'A07:2021']
      references:
        - https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password
        - https://datatracker.ietf.org/doc/html/rfc7468
      category: security
      technology: [java, spring, node, generic, yaml, properties, key]
      license: Internal-Proprietary
      ai_native_methodology:
        antipattern: AP-SECURITY-001
        applies_to: BE
        cross_poc_evidence:
          - 'PoC #02 (Spring Boot 3.3 Hexagonal) — server/api/src/main/resources/app.key 직접 commit critical'
          - 'PoC #01 (Spring Boot 2.5) — JWT secret 21byte hardcode ( 별 rule jwt-secret-weak)'
          - 'PoC #03 (NestJS) — Bearer 표준 ✅ positive (학습 효과 / 비재현)'
        cross_poc_isomorphic_count: 2
        introduced_in: v1.4.4-pre
