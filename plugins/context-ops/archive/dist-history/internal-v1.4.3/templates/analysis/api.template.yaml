openapi: 3.1.0
info:
  title: "{시스템명} API"
  version: "1.0.0"
  description: |
    AI-Native 분석 도구 v1.1로 자동 추출.
    
    **주의**: 본 명세는 산업 표준 OpenAPI 3.1을 따르며,
    AI 분석 메타는 `x-` prefix 확장으로 표기됩니다.
    
    상세 분석 메타: `api-extension.json` 참조.
  
  x-meta:
    generated_at: "{meta.generated_at}"
    source_commit_sha: "{meta.source_commit_sha}"
    methodology_version: "1.1.0"
    inputs_used:
      - source_code
      - inventory
      - domain_model
      - business_rules
    confidence: 0.85
    confidence_breakdown:
      endpoint_identification: 0.95
      schema_extraction: 0.85
      operationid_uc_matching: 0.65
      related_rules_matching: 0.60
    human_review_required:
      - "operationId ↔ Use Case 매핑 검증"
      - "x-related-rules 매칭 검증"

servers:
  - url: https://api.example.com/v1
    description: Production
  - url: https://staging-api.example.com/v1
    description: Staging

tags:
  - name: orders
    description: 주문 관리
    x-bounded-context: BC-ORDER
  - name: users
    description: 사용자 관리
    x-bounded-context: BC-USER
  - name: payments
    description: 결제 관리
    x-bounded-context: BC-PAYMENT

paths:
  /orders:
    post:
      operationId: createOrder
      summary: "주문 생성"
      tags: [orders]
      x-related-use-cases: [UC-ORDER-001]
      x-related-rules: 
        - BR-ORDER-007  # 19세 미만 거부 (주류)
        - BR-ORDER-008  # 재고 확인
        - BR-ORDER-FREE-SHIPPING  # 5만원 이상 무료배송
      x-confidence: 0.85
      
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      
      responses:
        '201':
          description: "주문 생성 성공"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          description: "정책 위반"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyViolationError'
              examples:
                age_restricted:
                  value:
                    code: AGE_RESTRICTED
                    message: "성인 인증 필요"
                    rule_id: BR-ORDER-007
        '409':
          description: "재고 부족"
      
      security:
        - bearerAuth: []
    
    get:
      operationId: listOrders
      summary: "주문 목록 조회"
      tags: [orders]
      x-related-use-cases: [UC-ORDER-LIST]
      x-related-rules: [BR-USER-PERM-001]
      x-confidence: 0.90
      
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, PAID, SHIPPED, DELIVERED, CANCELLED]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'

  /orders/{orderId}/cancel:
    post:
      operationId: cancelOrder
      summary: "주문 취소"
      tags: [orders]
      x-related-use-cases: [UC-ORDER-002]
      x-related-rules:
        - BR-ORDER-CANCEL-001  # 상태 제약
        - BR-ORDER-CANCEL-002  # 30분 시간 제약
      x-confidence: 0.85
      
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      
      responses:
        '200':
          description: "취소 성공"
        '400':
          description: "취소 불가 (정책 위반)"

# ====================================
# Webhooks (5.D 외부 의존성에서 라우팅)
# ====================================
  /webhooks/payment:
    post:
      operationId: handlePaymentWebhook
      summary: "결제 PG에서 호출하는 webhook"
      tags: [payments]
      x-external-source: EXT-PAYMENT-TOSS
      x-direction: inbound
      x-confidence: 0.95
      
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookEvent'
      
      responses:
        '200':
          description: "수신 확인"

# ====================================
# Components (재사용 스키마)
# ====================================
components:
  schemas:
    # 도메인 엔티티에서 추출됨
    Order:
      type: object
      x-related-entity: E-ORDER-Order
      required: [id, userId, totalAmount, status]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        totalAmount:
          $ref: '#/components/schemas/Money'
        status:
          type: string
          enum: [PENDING, PAID, SHIPPED, DELIVERED, CANCELLED]
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
    
    OrderItem:
      type: object
      x-related-entity: E-ORDER-OrderItem
      required: [productId, quantity, unitPrice]
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          $ref: '#/components/schemas/Money'
    
    Money:
      type: object
      x-related-entity: VO-COMMON-Money
      required: [amount, currency]
      properties:
        amount:
          type: number
          format: decimal
        currency:
          type: string
          example: KRW
    
    CreateOrderRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 99  # BR-ORDER-MAX-ITEMS
          items:
            type: object
            properties:
              productId:
                type: string
                format: uuid
              quantity:
                type: integer
                minimum: 1
    
    OrderListResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        page:
          type: integer
        totalPages:
          type: integer
    
    ValidationErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              issue: { type: string }
    
    PolicyViolationError:
      type: object
      required: [code, message, rule_id]
      properties:
        code:
          type: string
        message:
          type: string
        rule_id:
          type: string
          description: "위반된 비즈니스 규칙 ID (BR-XXX)"
    
    PaymentWebhookEvent:
      type: object
      properties:
        eventType:
          type: string
          enum: [PAYMENT_COMPLETED, PAYMENT_FAILED, REFUND_COMPLETED]
        externalPaymentId:
          type: string
        amount:
          $ref: '#/components/schemas/Money'
  
  responses:
    ValidationError:
      description: "입력 검증 실패"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
  
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
