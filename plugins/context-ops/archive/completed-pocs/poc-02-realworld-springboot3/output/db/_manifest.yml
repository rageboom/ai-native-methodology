# Findings (Phase 2 신규 등록)
findings_phase_2:
  - id: 'F-048'
    title: 'TagJpaRepository<Tag, Integer> 타입 파라미터 오류 (Tag PK 가 String) '
    severity: 'critical'
    proposed_fix: 'JpaRepository<Tag, String> 으로 정정 (1글자 변경)'
    status: 'promoted (Senior 직접 발견 — F-044 패턴 재현)'
  - id: 'F-049'
    title: 'v1.1.2 §3.4 Decision Tree Q3 누락 (closed F-016 명세 한계) '
    severity: 'high'
    proposed_fix: 'v1.2.0 격상 묶음 — phase-2-db.md §3.4 Q3 추가 + finding-system closed→reopened 절차 정식화'
    status: 'promoted (메타 finding)'
  - id: 'F-050'
    title: 'schema.sql ORM derivative — 정합성 검증 의미 약화'
    severity: 'high'
    proposed_fix: 'v1.2.0 격상 묶음 — DDL 출처 검증 절차 (NamingHelper hash 패턴 분별 단서)'
    status: 'promoted'
  - id: 'F-051'
    title: 'Article.articleTags EAGER + Specification + Pageable HHH000104 위험'
    severity: 'high'
    proposed_fix: 'FetchType.LAZY + @EntityGraph 또는 JOIN FETCH 명시 (Vlad/우형 권장)'
    status: 'promoted (PoC #01 AP-PERFORMANCE-001 격상 medium → high)'
  - id: 'F-052'
    title: 'article.title varchar(50) unique over-constraint anti-pattern'
    severity: 'high'
    proposed_fix: 'title unique 제거 + slug unique 만 유지 (RealWorld spec 정합 + Medium/Velog 패턴)'
    status: 'promoted (단 §8.1 — RealWorld 특이성 caveat)'
  - id: 'F-053'
    title: 'titleToSlug 8가지 함정 (Locale/Unicode/collision/leading-trailing-dash)'
    severity: 'medium'
    proposed_fix: 'Slugify 라이브러리 + Normalizer.NFD + Locale.ENGLISH 명시'
    status: 'promoted'
  - id: 'F-054'
    title: 'users.email varchar(30) RFC 5321 위반 (권장 254/320)'
    severity: 'medium'
    proposed_fix: 'VARCHAR(255) 또는 VARCHAR(320) 강제'
    status: 'promoted'
  - id: 'F-055'
    title: 'varchar(50) 한국어 환경 부족 (title/description) — UTF-8 환경 글자 수 한계'
    severity: 'medium'
    proposed_fix: 'title VARCHAR(200) / description VARCHAR(500) / content TEXT 권장'
    status: 'candidate (Phase 6 합산)'
  - id: 'F-056'
    title: 'password varchar(200) BCrypt 충분 / Argon2 도입 시 부족'
    severity: 'medium'
    proposed_fix: 'VARCHAR(255) 또는 TEXT (Spring Security delegatingPasswordEncoder 대비)'
    status: 'candidate'
  - id: 'F-057'
    title: 'UUID + Integer PK FK 타입 혼재 — cardinality estimation 영향'
    severity: 'medium'
    proposed_fix: 'ID 전략 일관 (전체 UUID v7 또는 전체 bigint) ADR 신설'
    status: 'candidate'
  - id: 'F-058'
    title: 'App existsBy* TOCTOU race-prone (educational)'
    severity: 'low'
    proposed_fix: 'DB UQ 가 race-safe 보호자임 명시 + Service layer DataIntegrityViolationException 처리'
    status: 'candidate'

