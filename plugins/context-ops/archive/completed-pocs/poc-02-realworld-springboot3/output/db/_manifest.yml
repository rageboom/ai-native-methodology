    confidence: 0.95
  - file: 'erd.mermaid'
    purpose: 'ERD (Mermaid erDiagram) — PoC #01 비교 표'
    confidence: 0.92
  - file: '정합성-검증-보고서.md'
    purpose: '출처 의존성 caveat 보고서 — DRIFT 0건 (출처 1종)'
    confidence: 0.90
  - file: '_manifest.yml'
    purpose: 'Phase 2 매니페스트 (본 파일)'
    confidence: 0.95

# 결정적 처리 결과 (filesystem 환경)
deterministic_results:
  raw_fetch:
    schema_sql:
      path: 'module/persistence/src/main/resources/schema.sql'
      bytes: ~3000
      tables: 7
      fk_count: 9
      uq_count: 6
    application_yaml:
      paths:
        - 'module/persistence/src/main/resources/application.yaml'
        - 'server/api/src/main/resources/application.yaml'
      key_settings:
        - 'spring.jpa.open-in-view=false'
        - 'spring.jpa.hibernate.ddl-auto=create-drop'
        - 'spring.datasource.url=jdbc:h2:mem:testdb?MODE=MYSQL'
        - 'decorator.datasource.p6spy.enable-logging=true'
    jpa_entities:
      core:
        [
          'User.java',
          'Article.java',
          'ArticleComment.java',
          'ArticleTag.java',
          'Tag.java',
          'UserFollow.java',
          'ArticleFavorite.java',
        ]
      total: 7

# 통합 우선순위 정책 (DEC-PHASE2-POC02-001 )
consistency_priority:
  policy: 'ORM_only'
  reason: 'schema.sql 의 9 FK + 3 UQ 제약명 100% Hibernate `NamingHelper.generateHashedFkName` MD5 hash 패턴 — schema.sql = ORM derivative 확정. JPA Entity = SoT 단일.'
  finding_ref: 'F-049, F-050'
  poc_01_comparison: |
    PoC #01: DDL_over_JPA (F-016 §3.4 Decision Tree Q1=No/Q2=No 정합)
    PoC #02: ORM_only (Decision Tree §3.4 Q3 누락 발견 — closed F-016 명세 한계 )
  v112_decision_tree_fit: '부분 fit (Q1/Q2 정합 / Q3 누락 — PF-PHASE2-META-001 high promoted)'

# DRIFT 요약 — 본 PoC 는 출처 1종이므로 비교 의미 없음
drift_summary:
  total: 0
  total_meaningful: false
  reason: '출처 사실상 1종 (ORM 단일) — schema.sql = ORM derivative'
  by_severity:
    high: 0
    medium: 0
    low: 0
  decision_required_count: 0
  contrast_with_poc_01: |
