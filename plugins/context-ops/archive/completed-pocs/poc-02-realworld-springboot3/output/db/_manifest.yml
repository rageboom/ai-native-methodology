    PoC #02: DRIFT 0건 (출처 1종) — schema.sql 자체가 ORM 그림자

# 6 핵심 결정 (DEC-PHASE2-POC02-001~006) — Auto Mode 자율 적용
key_decisions:
  - id: 'DEC-PHASE2-POC02-001'
    title: 'schema.sql = ORM derivative 확정 + 정합성 검증 의미 약화 caveat'
    decision: 'JPA Entity = SoT 단일. 정합성 검증 보고서 = 출처 의존성 caveat 보고서 형태'
    rationale: '9 FK + 3 UQ 제약명 100% Hibernate hash 패턴 (3-합의: Document/Case/Senior)'
    auto_mode_applied: true
  - id: 'DEC-PHASE2-POC02-002'
    title: 'AP-DOMAIN-002 race-safe vs race-prone framework 채택'
    decision: '본 PoC = race-safe DB UQ 1중 + race-prone App TOCTOU 1중 = 적정 방어'
    rationale: 'Senior framework 채택 — layer 개수보다 race-safety 본질적'
    auto_mode_applied: true
  - id: 'DEC-PHASE2-POC02-003'
    title: 'PF-PHASE2-META-001 (F-049) high promoted — closed F-016 명세 한계'
    decision: 'v1.2.0 격상 묶음 — finding-system closed→reopened 절차 정식화 권고'
    rationale: 'v1.1.2 closed 항목 첫 외부 검증 한계 노출'
    auto_mode_applied: true
  - id: 'DEC-PHASE2-POC02-004'
    title: 'PF-P2-005 (F-048) critical 즉시 등록 — TagJpaRepository 타입 오류 '
    decision: '사내 적용 시 1글자 fix 필수 (JpaRepository<Tag, Integer> → <Tag, String>)'
    rationale: 'Senior 직접 read 발견 — F-044 패턴 재현 (메인 단편 fetch 함정)'
    auto_mode_applied: true
  - id: 'DEC-PHASE2-POC02-005'
    title: 'Phase 2 raw confidence 0.85 (cap 미적용)'
    decision: '출처 사실상 1종 → 명세 §6 `테이블/컬럼 식별 소스만 0.85` 적용'
    rationale: 'schema.sql ORM derivative 이므로 +0.10 보정 안 함'
    auto_mode_applied: true
  - id: 'DEC-PHASE2-POC02-006'
    title: '11 finding 등록 일괄 (F-048~F-058)'
    decision: 'Phase 2 신규 finding 11건 정식 등록 + Phase 6 합산 candidate 다수'
    rationale: '3 sub-agent 통합 + Senior 신규 발견'
    auto_mode_applied: true

