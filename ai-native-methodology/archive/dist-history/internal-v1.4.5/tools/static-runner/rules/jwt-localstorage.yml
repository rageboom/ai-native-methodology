rules:
  - id: internal.fe.security.jwt-localstorage
    message: |
      JWT/auth token 을 localStorage 에 저장 — XSS 공격 표면.
      ★ ADR-FE-007 / AP-FE-SECURITY-001 / OWASP A02 + A07.
      권고: httpOnly + Secure + SameSite=Lax cookie + CSP 강화.
    severity: HIGH
    languages: [js, ts]
    pattern-either:
      - patterns:
          - pattern: localStorage.setItem("$KEY", $VAL)
          - metavariable-regex:
              metavariable: $KEY
              regex: '(?i)(token|jwt|auth|access|bearer|session)'
      - patterns:
          - pattern: localStorage.setItem($KEY, $VAL)
          - metavariable-regex:
              metavariable: $KEY
              regex: '(?i)(token|jwt|auth|access|bearer|session)'
      - patterns:
          - pattern: window.localStorage.setItem("$KEY", $VAL)
          - metavariable-regex:
              metavariable: $KEY
              regex: '(?i)(token|jwt|auth|access|bearer|session)'
      - patterns:
          - pattern: window.localStorage.setItem($KEY, $VAL)
          - metavariable-regex:
              metavariable: $KEY
              regex: '(?i)(token|jwt|auth|access|bearer|session)'
    metadata:
      cwe: 'CWE-922'
      owasp: ['A02:2021', 'A07:2021']
      references:
        - https://owasp.org/www-community/HttpOnly
        - https://cheatsheetseries.owasp.org/cheatsheets/HTML5_Security_Cheat_Sheet.html
      category: security
      technology: [react, typescript, javascript]
      license: Internal-Proprietary
      ai_native_methodology:
        adr: ADR-FE-007
        antipattern: AP-FE-SECURITY-001
        cross_poc_isomorphic_count: 4
        introduced_in: v1.4.2
