  - id: "F-118"
    title: "★ JWT verify 3 곳 DRY 위반 + try/catch 부재 (auth.middleware:18 / user.decorator:14 / shared/base.controller:9)"
    severity: "high"
    proposed_fix: "@nestjs/passport 또는 Guards 패턴으로 통합 + JwtVerifyException catch → 401 응답"
    status: "promoted"
