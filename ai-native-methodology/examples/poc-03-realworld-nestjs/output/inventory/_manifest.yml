  - id: "F-119"
    title: "★ JWT 60일 expiry (user.service:103) — 너무 김"
    severity: "medium"
    proposed_fix: "15분 access token + refresh token 분리 또는 24시간 max"
    status: "promoted"
  - id: "F-120"
    title: "★ DB UQ 부재 — UserEntity (username/email) 동시 ArticleEntity (slug) 동시 — App pre-check 1중 race-prone"
    severity: "critical"
    proposed_fix: "TypeORM @Column 에 unique:true 추가 + race window 처리 (DataIntegrityViolation catch)"
    status: "promoted"
    cross_val_signal: "★★ PoC #02 AP-DOMAIN-002 isomorphic + 더 나쁜 (PoC #02 = 2중 / PoC #03 = 1중)"
  - id: "F-121"
    title: "★ FollowsEntity FK 제약 부재 (followerId/followingId 단순 number column)"
    severity: "high"
    proposed_fix: "@ManyToOne UserEntity 관계 추가 + cascade 정의"
    status: "promoted"
    cross_val_signal: "PoC #02 user_follow JPA @ManyToOne 와 본질적 차이"
  - id: "F-122"
    title: "★ TagEntity 미사용 — insert 코드 부재 / dead code 가능성"
    severity: "medium"
    proposed_fix: "TagService.create / Article 생성 시 tag 연결 로직 추가 또는 TagEntity 제거"
    status: "candidate"
  - id: "F-123"
    title: "★ ArticleEntity.tagList (simple-array) vs TagEntity 두 SoT — 의미 모순"
    severity: "medium"
    proposed_fix: "Phase 4 도메인 의미 결정 — tagList 통합 또는 TagEntity 제거"
    status: "candidate"
  - id: "F-124"
    title: "★ Article.comments eager:true — N+1 위험"
    severity: "medium"
    proposed_fix: "lazy loading + Pageable / 별도 endpoint"
    status: "promoted"
    cross_val_signal: "★ PoC #02 F-051 (Article EAGER + Specification HHH000104) cross-val 재현"
  - id: "F-125"
    title: "★ slugify random suffix (article.service.slugify) — slug unique 회피 우회"
    severity: "low"
    proposed_fix: "DB UQ + 충돌 시 retry 또는 명시적 slug 입력"
    status: "promoted"
    cross_val_signal: "★ PoC #02 F-053 titleToSlug 8 함정 cross-val 재현 (변형 — random suffix)"
  - id: "F-126"
    title: "★ Update Article 시 slug 미업데이트 (TODO 주석 명시)"
    severity: "medium"
    proposed_fix: "title 변경 시 slug 재생성 + URL redirect 또는 명시적 immutable 정책"
    status: "promoted"
  - id: "F-127"
    title: "★ ValidationPipe 적용 controller 일관성 결여 — UserController 만"
    severity: "medium"
    proposed_fix: "main.ts 에 app.useGlobalPipes(new ValidationPipe()) 적용"
    status: "promoted"
  - id: "F-128"
    title: "★ class-validator 데코 coverage 12% (6/50+) — DTO 4종 + entity 6종 데코 0개"
    severity: "high"
    proposed_fix: "필수 BR 데코 추가 (UpdateUserDto / CreateArticleDto / CreateCommentDto / 모든 entity)"
    status: "promoted"
    cross_val_signal: "★ Senior 위험 3 — class-validator 가 DTO 단독이라는 가정조차 부분적"
  - id: "F-129"
    title: "★ swagger 데코 coverage 불균형 — ArticleController 만 풀세트"
    severity: "medium"
    proposed_fix: "User/Profile/Tag 도 @ApiOperation/@ApiResponse 추가"
    status: "promoted"
    cross_val_signal: "Senior 위험 6 정합 — silent 빈약 위험"
  - id: "F-130"
    title: "★ AuthMiddleware 사용 (legacy) — 현재 NestJS 권장 = Guards"
    severity: "low"
