# 본 phase 핵심 결정 (Auto Mode 자율 적용)
key_decisions:
  - id: "DEC-PHASE1-PoC03-001"
    title: "단일 NestJS module tree 분류 — Modular Monolith"
    decision: "5 module / 4 domain (User/Article/Profile/Tag) + 1 root (Application). Hexagonal 분류 ❌ — Senior 위험 5 정합."
    rationale: "별도 디렉토리 convention (core/application/infrastructure) 부재. NestJS Module = DI 경계."
    auto_mode_applied: true
  - id: "DEC-PHASE1-PoC03-002"
    title: "TypeORM naming strategy = default (camelCase 보존)"
    decision: "SnakeNamingStrategy 적용 흔적 부재. entity 데코 명시적 name (@Entity('user'/'article'/'tag'/'follows') + Comment 만 default)."
    rationale: "G6 v1.2.2 ORM sub-section (b) 정합 — Phase 2 schema 추출 시 적용."
    auto_mode_applied: true
  - id: "DEC-PHASE1-PoC03-003"
    title: "stack-detection 신뢰도 0.92 (정체 레포 / legacy 적합)"
    decision: "NestJS 7 (현재 10.x) / TypeORM 0.2 (현재 0.3+) / TS 3.8 (현재 5.x). 정체 = legacy 분석 적합."
    rationale: "본 방법론 = 'legacy → 형식 명세' 추출기. 정체 자체가 적합 시그널."
    auto_mode_applied: true
  - id: "DEC-PHASE1-PoC03-004"
    title: "Phase 3 architecture cap 0.85 (단일 module = PoC #02 0.65 대비 ↑)"
    decision: "PoC #02 multi-module Hexagonal hybrid 0.65 cap 대비 단일 module = 분류 단순 + 모호성 ↓ → cap 0.85 추정."
    rationale: "Phase 3 검증."
    auto_mode_applied: true
  - id: "DEC-PHASE1-PoC03-005"
    title: "preliminary finding signals 18+ → Phase 2~6 분배"
    decision: "본 phase 신규 finding 정식 등록 보류 — Phase 별 검증 후 정식 등록. 단 inventory.json 의 preliminary_findings_signals[] 에 18 시그널 보존."
    rationale: "PoC #02 의 phase-별 finding 등록 패턴 정합 + 5~15 건강 범위 내 등록."
    auto_mode_applied: true

