manifest:
  generated_at: "2026-04-27"
  poc_id: "poc-01-realworld-spring"
  phase: 2
  phase_name: "db (DB 스키마 + 정합성 검증)"
  methodology_version: "v1.1.1"

# 상위 phase 인계
phase_1_input:
  source: "../inventory/_manifest.yml"
  consistency:
    source_repo_match: true
    domain_priorities_match: true   # Article 1순위 ground truth → article 도메인 테이블 4개 (articles, articles_tags, article_favorites, comments)
    stack_consistency: true         # Spring Boot 2.5.2 + JPA + H2(PostgreSQL mode)

# Phase 2 산출물 5종
deliverables:
  - file: "schema.json"
    purpose: "AI용 통합 스키마 (db-schema.schema.json 준수)"
    schema: "schemas/db-schema.schema.json ✅"
    confidence: 0.92
  - file: "schema.sql"
    purpose: "통합 SQL (RealWorld 원본 + 헤더 주석)"
    confidence: 0.98
  - file: "erd.mermaid"
    purpose: "ERD (Mermaid erDiagram)"
    confidence: 0.95
  - file: "정합성-검증-보고서.md"
    purpose: "DRIFT 9건 + 사용자 결정 4건"
    confidence: 0.90
  - file: "_manifest.yml"
    purpose: "Phase 2 매니페스트 (본 파일)"
    confidence: 0.98

# 결정적 처리 결과 (web_fetch 환경)
deterministic_results:
  raw_fetch:
    schema_sql:
      url: "https://raw.githubusercontent.com/raeperd/realworld-springboot-java/master/src/main/resources/schema.sql"
      bytes: 2425
      tables: 7
    application_properties:
      url: "https://raw.githubusercontent.com/raeperd/realworld-springboot-java/master/src/main/resources/application.properties"
      bytes: 254
      key_settings:
        - "spring.jpa.open-in-view=false"
        - "spring.jpa.hibernate.ddl-auto=none"
        - "spring.datasource.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE"
    jpa_entities:
      core: ["User.java", "Article.java", "ArticleContents.java", "Comment.java", "Tag.java"]
      embeddable_supplementary: ["Profile.java", "Email.java", "Password.java", "ArticleTitle.java", "UserName.java", "Image.java"]
      total: 11
  rate_limit:
    used_phase_2: 6   # schema.sql + app.props + Entity 5 + Embeddable 6 (1 already counted)
    remaining_after: 45

# 통합 우선순위 정책
consistency_priority:
  policy: "DDL_over_JPA"
  reason: "ddl-auto=none + 운영 DB 부재. 명세 §3.4 기본값 (DB > ORM > ERD) 의 DB 부재 케이스."
  finding_ref: "F-016"

# DRIFT 요약
drift_summary:
  total: 9
  by_severity:
    high: 0
    medium: 4   # DRIFT-002, 003, 007, 010
    low: 5      # DRIFT-001, 004, 006, 008, 009
  decision_required_count: 4
  details:
    DRIFT-001: "BIGSERIAL ↔ @GeneratedValue(IDENTITY) 메커니즘 — low"
    DRIFT-002: "user_followings ManyToMany vs OneToMany 의미 — medium, decision_required"
    DRIFT-003: "articles UNIQUE (author_id, slug) JPA 부재 — medium, decision_required"
    DRIFT-004: "body VARCHAR length 미명시 (articles/comments) — low"
    DRIFT-006: "comments.updated_at 의미 모호 — low"
    DRIFT-007: "articles.author_id FK ON DELETE 부재 — medium (사내 high), decision_required"
    DRIFT-008: "UserName/Image @Column length 미명시 — low"
    DRIFT-009: "Profile.bio length 검증 필요 (보강) — low"
    DRIFT-010: "users.email UNIQUE 부재 — medium, decision_required"

# Embeddable 라우팅 (Phase 4 5.A 입력)
embeddable_routing:
  total_embeddables: 7
  nesting_levels: 3   # User → Profile → Image/UserName
  items:
    ArticleContents:  {parent: "Article", level: 1, contains_collection: true, finding_ref: "F-017"}
    ArticleTitle:     {parent: "ArticleContents", level: 2, contains_collection: false}
    Email:            {parent: "User", level: 1, contains_collection: false}
    Password:         {parent: "User", level: 1, contains_collection: false}
    Profile:          {parent: "User", level: 1, contains_collection: false}
    UserName:         {parent: "Profile", level: 2, contains_collection: false}
    Image:            {parent: "Profile", level: 2, contains_collection: false}
  phase_4_input: true

# 명세 §5 + research-phase2 §5 승인 게이트 체크리스트
approval_gate:
  - check: "schema.json db-schema.schema.json 준수"
    status: "✅ — schemas/db-schema.schema.json 검증 (formal validation 권장)"
  - check: "erd.mermaid 렌더링"
    status: "✅ — Mermaid erDiagram 표준"
  - check: "모든 테이블 PK 명시"
    status: "✅ 7/7 (단일 4 + 복합 3)"
  - check: "FK 명시 (8건)"
    status: "✅ 7 explicit + 1 (DRIFT-007 NO ACTION)"
  - check: "정합성 검증 보고서 사람 검토"
    status: "🔄 윤주스 검토 필요 (DRIFT-002/003/007/010)"
  - check: "severity=high 항목 결정"
    status: "✅ N/A (현재 0건)"
  - check: "통합 우선순위 정책 사용자 확인"
    status: "🔄 DDL > JPA — 윤주스 확인 필요 (F-016)"
  # 보강
  - check: "database_type 듀얼 표기"
    status: "✅ postgresql (의도) + h2 (actual_runtime_db)"
  - check: "tables[].sources 양 출처"
    status: "✅ orm + migration"
  - check: "@Embedded 6/7 Phase 4 라우팅 메모"
    status: "✅ embeddable_routing_to_phase4"
  - check: "@JoinTable 3개 도메인 의도 검증 메모"
    status: "✅ DRIFT-002 + ArticleContents.tags (F-017)"
  - check: "check_constraints[] 빈 배열 + Phase 4 라우팅 메모"
    status: "✅ check_constraints: [] + warnings 명시"
  - check: "Phase 2 종료 시 finding 최소 3건 정식 등록"
    status: "🔄 진행 중 (다음 step)"

# Phase 3 진입 시 인계 사항
phase_3_handoff:
  - "테이블 그룹 매핑: article 도메인 (articles + articles_tags + article_favorites + comments) / user 도메인 (users + user_followings) / tag 도메인 (tags)"
  - "Phase 1 모듈 우선순위 (Article 1, User 2) 와 정합 ✅"
  - "Hexagonal/Clean Architecture 후보 (Phase 1 candidate 0.65) 의 의존 방향 검증 — domain/ ↔ infrastructure/ ↔ application/"
  - "DDD-Lite Aggregate 후보: User (Embeddable 4 + follow) / Article (Embeddable 2 + tags + comments)"

