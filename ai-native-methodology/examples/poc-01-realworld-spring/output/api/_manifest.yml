key_decisions:
  - id: 'DEC-API-001'
    decision: 'Authorization: Token <jwt> → OpenAPI apiKey security scheme (Bearer 아님)'
    rationale: 'RFC 6750 비표준이지만 OpenAPI 3.1 apiKey 가 모든 헤더 토큰 수용. 카카오 KakaoAK / GitHub 사례 정당화.'
    sources:
      [
        'document-phase5.md §2.4 / §9.1',
        'case-phase5.md 토픽 6',
        'senior-phase5.md 영역 14',
      ]
  - id: 'DEC-API-002'
    decision: 'Wrapped DTO ({user/article/...:{...}}) → wrapper schema 분리 (3-tier 명명)'
    rationale: 'Inner schema (User/Article/Comment/Profile) = Aggregate. Wrapper Response/Request 분리 — 명명 충돌 회피.'
    sources:
      [
        'document-phase5.md §2.2',
        'case-phase5.md 토픽 4',
        'senior-phase5.md 영역 2',
      ]
  - id: 'DEC-API-003'
    decision: 'F-027 De Morgan 명시 — description + x-warning + x-known-bug 3중 표기'
    rationale: 'Senior critical 권고 — description 만으로는 client codegen 누락. Phase 6 critical AP cross-link 필수.'
    sources: ['senior-phase5.md 영역 6']
  - id: 'DEC-API-004'
    decision: 'LV-001 → api-extension.json `x-architectural-debt` 만 노출 (openapi.yaml 표준 보전)'
    rationale: 'GitHub `x-github` extension 패턴 isomorphic 모방 — 사내 메타 노출 vs 표준 spec 분리.'
    sources: ['case-phase5.md 토픽 4', 'document-phase5.md §7.4']
  - id: 'DEC-API-005'
    decision: '4 GET /articles 변형 → 단일 operationId GetArticles + query parameters + UC 4건 통합'
    rationale: 'OpenAPI 3.1 Spectral operation-operationId-unique 룰 + RealWorld 공식 spec 일치.'
    sources: ['document-phase5.md §6', 'case-phase5.md 토픽 1']

