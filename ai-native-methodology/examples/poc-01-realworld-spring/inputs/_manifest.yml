manifest:
  generated_at: "2026-04-26"
  poc_id: "poc-01-realworld-spring"
  target_repo: "raeperd/realworld-springboot-java"
  target_repo_url: "https://github.com/raeperd/realworld-springboot-java"

# 입력 가용성 (필수 + 선택)
inputs_detected:
  source_code: true               # 필수 — web_fetch로 선택적 접근
  erd: false                      # 없음
  db_metadata: false              # 운영 DB 없음 (개발용 H2/임베디드)
  planning_docs: false            # README는 있으나 정식 기획문서 없음
  design_specs: false             # FE 미포함이라 N/A
  domain_context: true            # ✅ 본 PoC에서 작성
  config_files: true              # application.properties (Phase 1에서 fetch)
  
# 신뢰도 영향 분석 (입력 조합 기반 — ADR-003 §6 산정 공식 v1 적용)
confidence_implications:
  formula_version: "v1"
  
  # 산정 (2026-04-26 갱신, F-003 해결 후)
  base: 0.75
  
  applied_modifiers:
    - name: "orm_full"
      value: 0.10
      reason: "JPA 자동 감지 (Spring Data JPA)"
    - name: "domain_context_md"
      value: 0.03
      reason: "본 PoC에서 작성"
    - name: "postman_or_api_test"
      value: 0.05
      reason: "doc/Conduit.postman_collection.json + doc/run-api-tests.sh"
    - name: "diagrams_other"
      value: 0.02
      reason: "drawio 3개 (User/Article/JWT)"
  
  applied_penalties: []   # 본 PoC에는 페널티 적용 없음
  
  raw: 0.95              # 0.75 + 0.10 + 0.03 + 0.05 + 0.02
  cap_applied: false     # 0.95 < 0.98 — cap 미적용
  
  expected_confidence_average: 0.95
  
  reasoning: |
    이전 추정 0.78은 plan §3.2 직관 표 기반 → F-003 해결로 정확한 공식 적용.
    소스(0.75) + ORM(+0.10) + domain-context(+0.03) + Postman/API test(+0.05) + 다이어그램(+0.02) = 0.95.
    ⚠️ 단 이건 "전체 평균" 신뢰도. 영역별로는 진폭 있음 (per_phase_expected 참조).
    ⚠️ PoC 종료 시 실제 산출물의 confidence_breakdown으로 가중 평균 재산정 권장.
  
  per_phase_expected:
    phase_1_init: 0.95           # 결정적 처리 위주
    phase_2_db: 0.85             # ORM 단일 출처 (정합성 검증 N/A)
    phase_3_arch: 0.90           # 의존성 그래프 결정적 + 다이어그램 ground truth
    phase_4_5a_db: 0.85          # ORM @Embedded 직접 추출 + 도메인 다이어그램
    phase_4_5b_fe: null          # FE 미포함
    phase_4_5c_config: 0.75      # application.properties (단순)
    phase_4_5d_external: 0.50    # 외부 의존성 거의 없음 (예상)
    phase_5_1_api: 0.92          # Postman ground truth 매우 강함
    phase_5_2_ui: null           # FE 미포함
    phase_6_quality: 0.85        # 통합 분석

# PoC 한계 (정직히)
limitations:
  - "FE 미포함 (Phase 5-2 N/A, 5.B FE 영역 N/A)"
  - "외부 의존성 부재 (5.D 추출 빈약 예상)"
  - "다중 출처 부재 (정합성 검증 N/A)"
  - "비즈니스 규칙 적음 (학습용 spec)"
  - "한국 엔터프라이즈와 다른 도메인"

# 진행 모드
mode:
  execution: "human-AI 합동"          # Claude 1차 + 윤주스 검토
  scope: "BE만, Phase 0~1 우선"
  granularity: "Phase 단위로 끊기"
  source_access: "web_fetch 선택적"

# Phase 0 체크리스트 결과
