    purpose: "본 파일 — Phase 1 메타 + 신뢰도 자평"

# 신뢰도 자평 (formula v1)
confidence:
  formula_version: "v1"
  base: 0.75
  applied_modifiers:
    - {name: "orm_full", value: 0.10, reason: "JPA + Specifications + Cache + p6spy 4단서 + secondary"}
    - {name: "domain_context_md", value: 0.03, reason: "PoC #1 inputs/domain-context.md 재사용 (RealWorld spec 동일)"}
    - {name: "postman_or_api_test", value: 0.05, reason: "api-docs/Conduit.postman_collection.json + run-api-tests.sh"}
    - {name: "diagrams_other", value: 0.02, reason: "README ERD 이미지 (외부 호스팅)"}
  applied_penalties: []
  raw: 0.95
  cap_applied: false   # raw 0.95 < 0.98
  weighted_average: 0.93   # architecture_style_candidates cap 0.65 반영
  cap_reason: "architecture_style_candidates Phase 1 cap 0.7 + Senior 정정으로 0.65"
  expected_phase_average_from_plan: 0.95
  delta_vs_plan: -0.02
  delta_reason: "Senior 가 메인 사전 fetch 정정 (core Spring 의존성 0 단언 → 정정) → architecture_style_candidates Pure Hexagonal 단정 회피 → 0.65 cap. 정직성 ↑ (단일 PoC 과적합 회피)."

confidence_breakdown:
