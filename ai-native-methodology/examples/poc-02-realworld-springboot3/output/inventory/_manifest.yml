    confidence: 0.98
    element_count: 1
    extraction_method: deterministic
  file_stats_loc:
    confidence: 0.98
    element_count: 92
    extraction_method: deterministic
  package_manifests:
    confidence: 0.98
    element_count: 6   # root + module/core + module/persistence + server/api + libs.versions.toml + settings.gradle.kts
    extraction_method: deterministic
  orm_detection:
