name: drift-check

# Sprint 4 묶음 N+O CI workflow.
# 이중 모드: PR (diff-aware) / nightly (full). action 핀 (research 반영).
#   - actions/setup-java@v5  (Temurin 21)
#   - actions/setup-node@v6  (npm cache)
# 본 workflow 는 GitHub Actions 미사용 환경에서 local 실행도 가능 (각 step 의 cmd 참고).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 매일 02:00 UTC nightly full scan
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # SARIF upload (Code Scanning)
  pull-requests: write

jobs:
  drift-validator:
    name: drift-validator (state-machine + sequence + decision-table)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'ai-native-methodology/tools/drift-validator/package-lock.json'

      - name: install drift-validator
        working-directory: ai-native-methodology/tools/drift-validator
        run: npm install --no-audit --no-fund

      - name: install decision-table-validator
        working-directory: ai-native-methodology/tools/decision-table-validator
        run: npm install --no-audit --no-fund

      - name: drift-validator self-test (corpus 4쌍 + dmn-check)
        run: |
          (cd ai-native-methodology/tools/drift-validator && npm test)
          (cd ai-native-methodology/tools/decision-table-validator && npm test)

      - name: drift-validator on PoC #02 formal-spec
        run: |
          node ai-native-methodology/tools/drift-validator/src/cli.js \
            ai-native-methodology/examples/poc-02-realworld-springboot3/output/formal-spec/

      - name: decision-table-validator on PoC #02
        run: |
          node ai-native-methodology/tools/decision-table-validator/src/cli.js \
            ai-native-methodology/examples/poc-02-realworld-springboot3/output/formal-spec/decision-tables/

  static-runner:
    name: static-runner (Semgrep + PMD — real tool only, no simulation)
    runs-on: ubuntu-latest
    # PR 단위 = diff-aware / nightly = full scan (이중 모드 — 테크기업 사례 정합).
    env:
      SEMGREP_BASELINE_REF: ${{ github.event_name == 'pull_request' && 'main' || '' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # diff-aware scan 위해 full history 필요

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: install Semgrep
        run: |
          python3 -m pip install --user semgrep
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: install PMD
        run: |
          curl -fsSL -o /tmp/pmd.zip https://github.com/pmd/pmd/releases/download/pmd_releases%2F7.9.0/pmd-dist-7.9.0-bin.zip
          unzip -q /tmp/pmd.zip -d "$HOME/pmd"
          echo "$HOME/pmd/pmd-bin-7.9.0/bin" >> "$GITHUB_PATH"

      - name: install static-runner
        working-directory: ai-native-methodology/tools/static-runner
        run: npm install --no-audit --no-fund

      - name: run Semgrep on body (diff-aware on PR / full on schedule)
        working-directory: ai-native-methodology
        run: |
          mkdir -p tools/static-runner/out
          node tools/static-runner/src/cli.js \
            --plugin semgrep \
            --target . \
            --output tools/static-runner/out \
            --ruleset p/owasp-top-ten \
            --extra-rules tools/static-runner/rules/jwt-secret-weak.yml \
            --extra-rules tools/static-runner/rules/rsa-private-key-commit.yml \
            --extra-rules tools/static-runner/rules/error-mapping-missing.yml

      # v1.4.2 PATCH — PoC #04 full FE 트랙 (custom rule + ratchet 모드 default).
      # 의의: ADR-010 §2.3 정합 — critical/high severity 신규 결함 = CI fail (production blocker).
      # baseline (semgrep-baseline.json) = v1.4.1 시점 0 findings 첫 작성. novel 1+ = blocked.
      - name: run Semgrep on PoC #04 full (FE 트랙 / custom rule + ratchet)
        working-directory: ai-native-methodology
        run: |
          node tools/static-runner/src/cli.js \
            --plugin semgrep \
            --target examples/poc-04-full-realworld-react/INPUT/src \
            --output examples/poc-04-full-realworld-react/analysis/6-quality/semgrep-output \
            --ruleset p/owasp-top-ten \
            --extra-rules tools/static-runner/rules/jwt-localstorage.yml \
            --baseline examples/poc-04-full-realworld-react/analysis/6-quality/semgrep-baseline.json \
            --ratchet

      - name: run PMD on Java targets (PoC examples)
        working-directory: ai-native-methodology
        continue-on-error: true # PMD 의 false positive 폭발 baseline 미설정 시 일시 허용
        run: |
          node tools/static-runner/src/cli.js \
            --plugin pmd \
            --target examples/poc-02-realworld-springboot3 \
            --output tools/static-runner/out

      - name: lint-no-simulation (no-sim policy enforce)
        run: |
          bash ai-native-methodology/tools/static-runner/src/lint-no-simulation.sh \
            ai-native-methodology/tools/static-runner/out

      - name: upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ai-native-methodology/tools/static-runner/out/

      - name: upload evidence artifact (5종 물증 보존)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-runner-evidence
          path: ai-native-methodology/tools/static-runner/out/
          retention-days: 30
